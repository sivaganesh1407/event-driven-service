services:
  mongodb:
    image: mongo:7
    container_name: event-driven-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: event-driven-service
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: event-driven-service
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongodb:27017/event-driven-service
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
